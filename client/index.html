<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>

    <div id="onboarding" class="screen hidden">
        <h1>Welcome to the Pager setup!</h1>
        <p>Please enter your name to get started.</p>
        <input type="text" id="userNameInput" placeholder="Your Name">
        <button id="getStartedBtn">Enable Notifications & Start</button>
    </div>

    <div id="home" class="screen hidden">
        <h1>Hello, <span id="displayName"></span>!</h1>

        <button id="actionBtn">Gross Alarm</button>

        <div class="users-header">
            <h2>Users</h2>
            <button id="reloadUsersBtn" class="icon-btn" type="button" aria-label="Reload user list" title="Reload user list">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M17.66 6.34 A 8 8 0 1 0 17.66 17.66" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    <path d="M20 4v6h-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </button>
        </div>
        <ul id="itemList">
            <li class="loading">Waking up the server... please wait...</li>
        </ul>
    </div>

    <button id="resetBtn" class="minimal-reset">Reset</button>
    <div id="serverWakeIndicator" class="server-indicator is-waking" role="status" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <span class="status-text">Waking server...</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
